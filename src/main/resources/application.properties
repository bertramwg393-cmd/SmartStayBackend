# 1. 資料庫連線設定 (指向你的 SQL Server 與 SmartStayDB)
spring.datasource.url=jdbc:sqlserver://localhost:1433;databaseName=SmartStayDB;encrypt=true;trustServerCertificate=true;
spring.datasource.username=sa
spring.datasource.password=你的SQLServer密碼
spring.datasource.driver-class-name=com.microsoft.sqlserver.jdbc.SQLServerDriver

# 2. JPA / Hibernate 自動建立與更新資料表設定
spring.jpa.show-sql=true
spring.jpa.hibernate.ddl-auto=update
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.SQLServerDialect